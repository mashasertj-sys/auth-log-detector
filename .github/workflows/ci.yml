name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bandit (SAST)
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . --severity-level medium

      - name: Run Safety (SCA)
        run: |
          pip install safety
          safety check -r requirements.txt

      - name: Run Gitleaks (Secrets)
        run: |
          # Скачиваем gitleaks
          wget -O - https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar xz
          ./gitleaks detect --source . -v --report-format json --report-path gitleaks-report.json

      - name: Run Trivy (Container Security)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'python:3.11-slim'
          format: 'table'
          exit-code: '0'

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check main.py

      - name: Run Tests
        run: |
          pip install pytest
          pytest tests/ -v

      - name: Run Smoke Test
        run: python main.py --log sample_logs.txt --rules rules.yaml --format table