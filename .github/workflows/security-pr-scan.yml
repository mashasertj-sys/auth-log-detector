name: PR Security Scan

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety requests pyyaml

      - name: Run custom OWASP scanner
        id: custom_scan
        run: |
          python pr_security_check.py --pr-base ${{ github.event.pull_request.base.sha }} --pr-head ${{ github.event.pull_request.head.sha }} --output scan_results.json
        continue-on-error: true

      - name: Run Bandit (SAST)
        id: bandit
        run: |
          bandit -r . -f json -o bandit_report.json || true
        continue-on-error: true

      - name: Run Safety (SCA)
        id: safety
        run: |
          safety check -r requirements.txt --json > safety_report.json || true
        continue-on-error: true

      - name: Aggregate results
        run: |
          python aggregate_results.py --bandit bandit_report.json --safety safety_report.json --custom scan_results.json --output final_report.json

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('final_report.json', 'utf8'));

            let body = '## Security Scan Results\n\n';
            const summary = report.summary;
            body += '| Severity | Count |\n|----------|-------|\n';
            body += `| Critical | ${summary.critical} |\n`;
            body += `| High | ${summary.high} |\n`;
            body += `| Medium | ${summary.medium} |\n`;
            body += `| Low | ${summary.low} |\n\n`;

            if (summary.critical > 0 || summary.high > 0) {
              body += '**Blocking merge**: Critical/High vulnerabilities found.\n\n';
            } else if (summary.medium > 0) {
              body += '**Warning**: Medium severity issues found. Review recommended.\n\n';
            } else {
              body += '**No blocking issues found**. Good job!\n\n';
            }

            if (report.findings && report.findings.length > 0) {
              body += '<details><summary>View Details</summary>\n\n';
              report.findings.slice(0, 10).forEach(f => {
                body += `- **${f.severity}**: ${f.title}\n`;
                body += `  - File: \`${f.file}:${f.line || '?'}\`\n`;
                body += `  - Fix: ${f.remediation}\n\n`;
              });
              if (report.findings.length > 10) {
                body += `_...and ${report.findings.length - 10} more. Check the actions tab._\n`;
              }
              body += '\n</details>\n';
            }

            body += `\n[Full Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            const {  comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            for (const comment of comments) {
              if (comment.user.login === 'github-actions[bot]' && comment.body.includes('Security Scan Results')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

      - name: Fail if critical vulnerabilities
        if: steps.custom_scan.outputs.critical_count > 0 || steps.bandit.outputs.critical_count > 0
        run: |
          echo "Critical security issues found. Merge blocked."
          exit 1